<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aplikasi Presensi MDTU Al Fallah</title>
<style>
  body { font-family: Arial, sans-serif; background:#f5f6f4; margin:0; padding:20px; }
  h1 { color:#0f6b4c; }
  table { border-collapse: collapse; width:100%; margin-top:20px; }
  th, td { border:1px solid #ccc; padding:8px; text-align:left; }
  th { background:#0f6b4c; color:#fff; }
  .status-HADIR { background:#d4edda; }
  .status-SAKIT { background:#ffeeba; }
  .status-IJIN { background:#bee5eb; }
  .status-ALPA { background:#f5c6cb; }
  .status-TERLAMBAT { background:#e2d6f5; }
</style>
</head>
<body>
<h1>Presensi MDTU Al Fallah</h1>
<p>Data diambil dari Google Sheet (CSV).</p>

<table id="presensiTable">
  <thead>
    <tr>
      <th>Klas</th>
      <th>Nama Siswa</th>
      <th>Nama Guru</th>
      <th>Mata Pelajaran</th>
      <th>Status Kehadiran</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
async function loadPresensiFromSheet() {
  const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSKOUuFwFy7AsVTj6UguCRxv1wmc4tVuIvpOQSRIGvgdzqrZWOqZjgDh9NtYXoM8g/pub?output=csv";
  const response = await fetch(sheetUrl);
  const text = await response.text();
  const rows = text.split("\n").map(r => r.split(","));
  console.log(rows); // cek isi CSV di console

  let presensi = [];
  rows.forEach((row, i) => {
    if (i === 0) return; // skip header
    presensi.push({
      klas: row[0],
      siswa: row[1],
      guru: row[2],
      matpel: row[3],
      status: row[4]
    });
  });
  return presensi;
}

async function renderPresensi() {
  const data = await loadPresensiFromSheet();
  const tbody = document.querySelector("#presensiTable tbody");
  tbody.innerHTML = "";
  data.forEach(item => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${item.klas}</td>
      <td>${item.siswa}</td>
      <td>${item.guru}</td>
      <td>${item.matpel}</td>
      <td class="status-${item.status}">${item.status}</td>
    `;
    tbody.appendChild(tr);
  });
}

renderPresensi();
</script>
</body>
</html>

loadAll();
</script>
</body>
</html>
