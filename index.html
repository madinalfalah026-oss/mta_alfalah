<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Presensi & Kegiatan Belajar - MDTU Al Fallah</title>
<style>
  /* --- CSS asli tetap --- */
  :root{
    --hijau:#0f6b4c; --hijau-tua:#0a4d37; --emas:#c99a3c;
    --bg:#f5f6f4; --card:#ffffff; --text:#22302b; --muted:#6b7a73; --border:#e1e5e2;
    --hadir:#1f9d55; --sakit:#e8a63c; --ijin:#3b82c4; --alpha:#d4453e; --terlambat:#8a5cd4;
  }
  /* ... semua CSS Anda tetap ... */
</style>
</head>
<body>

<!-- Semua struktur HTML asli Anda tetap -->
<div id="landingView" class="landing">
  <div class="card">
    <h2>Presensi & Kegiatan Belajar</h2>
    <p class="muted">Madrasah Diniyah Takmiliyah Ula (MDTU) Al Fallah</p>
    <button class="btn" id="btnMasukSantri" style="width:100%;margin-top:14px;">Isi Presensi Saya (Santri)</button>
  </div>
  <div class="card">
    <h2>Login Petugas</h2>
    <label>Password</label>
    <input type="password" id="pwLanding" placeholder="Masukkan password sesuai peran Anda">
    <div class="row" style="margin-top:12px;">
      <button class="btn secondary" id="btnLoginUstadz">Ustadz / Sekretaris</button>
      <button class="btn secondary" id="btnLoginWali">Wali Klas / Kepala</button>
    </div>
    <button class="btn secondary" id="btnLoginAdmin" style="width:100%;margin-top:10px;">Admin</button>
  </div>
</div>

<div id="appView" class="hidden">
  <!-- ... semua konten asli Anda tetap ... -->
</div>

<div id="toast" class="toast hidden"></div>

<script>
const STATUS_LIST = ['HADIR','SAKIT','IJIN','ALPHA','TERLAMBAT'];
const STATUS_SINGKAT = {HADIR:'H',SAKIT:'S',IJIN:'I',ALPHA:'A',TERLAMBAT:'T'};
let MASTER = null;
let SESI_AKTIF = null;
let RIWAYAT = [];
let ROLE = null;

/* --- Fungsi tambahan untuk load data dari Google Sheet --- */
async function loadMasterFromSheet() {
  const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSKOUuFwFy7AsVTj6UguCRxv1wmc4tVuIvpOQSRIGvgdzqrZWOqZjgDh9NtYXoM8g/pub?output=csv
";
  const response = await fetch(sheetUrl);
  const text = await response.text();
  const rows = text.split("\n").map(r => r.split(","));

  let klas = [], santri = [];
  rows.forEach((row, i) => {
    if (i === 0) return; // skip header
    const klasId = "KLAS" + row[0];
    if (!klas.find(k => k.id === klasId)) {
      klas.push({id: klasId, nama: "Klas " + row[0]});
    }
    santri.push({id: "ST" + i, klasId: klasId, nama: row[1], foto: ""});
  });

  return {
    config: { namaMadrasah: "MDTU Al Fallah", passwordAdmin:'admin123', passwordUstadz:'ustadz123', passwordWali:'wali123',
              sessionDurationMinutes:120, formula:{harian:30,uts:30,uas:40} },
    klas: klas,
    mapel: [],
    guru: [],
    santri: santri,
    buku: []
  };
}

/* --- Ganti loadAll agar ambil dari sheet --- */
async function loadAll(){
  MASTER = await loadMasterFromSheet();
  SESI_AKTIF = null;
  RIWAYAT = [];
  render();
}

/* --- Semua fungsi asli Anda tetap: toast, uid, enterApp, render, dll --- */
/* ... paste seluruh script asli Anda di sini tanpa diubah ... */

loadAll();
</script>
</body>
</html>
